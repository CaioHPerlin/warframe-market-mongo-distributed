services:
  # CONFIG SERVER RS
  configsvr1:
    image: mongo:7
    container_name: configsvr1
    command: mongod --configsvr --replSet configRS --port 27017 --bind_ip_all
    volumes:
      - configsvr1_data:/data/db
    networks:
      - mongo-cluster

  configsvr2:
    image: mongo:7
    container_name: configsvr2
    command: mongod --configsvr --replSet configRS --port 27017 --bind_ip_all
    volumes:
      - configsvr2_data:/data/db
    networks:
      - mongo-cluster

  configsvr3:
    image: mongo:7
    container_name: configsvr3
    command: mongod --configsvr --replSet configRS --port 27017 --bind_ip_all
    volumes:
      - configsvr3_data:/data/db
    networks:
      - mongo-cluster

  # SHARD 1 RS
  shard1svr1:
    image: mongo:7
    container_name: shard1svr1
    command: mongod --shardsvr --replSet shard1RS --port 27017 --bind_ip_all
    volumes:
      - shard1svr1_data:/data/db
    networks:
      - mongo-cluster

  shard1svr2:
    image: mongo:7
    container_name: shard1svr2
    command: mongod --shardsvr --replSet shard1RS --port 27017 --bind_ip_all
    volumes:
      - shard1svr2_data:/data/db
    networks:
      - mongo-cluster

  shard1svr3:
    image: mongo:7
    container_name: shard1svr3
    command: mongod --shardsvr --replSet shard1RS --port 27017 --bind_ip_all
    volumes:
      - shard1svr3_data:/data/db
    networks:
      - mongo-cluster

  # SHARD 2 RS
  shard2svr1:
    image: mongo:7
    container_name: shard2svr1
    command: mongod --shardsvr --replSet shard2RS --port 27017 --bind_ip_all
    volumes:
      - shard2svr1_data:/data/db
    networks:
      - mongo-cluster

  shard2svr2:
    image: mongo:7
    container_name: shard2svr2
    command: mongod --shardsvr --replSet shard2RS --port 27017 --bind_ip_all
    volumes:
      - shard2svr2_data:/data/db
    networks:
      - mongo-cluster

  shard2svr3:
    image: mongo:7
    container_name: shard2svr3
    command: mongod --shardsvr --replSet shard2RS --port 27017 --bind_ip_all
    volumes:
      - shard2svr3_data:/data/db
    networks:
      - mongo-cluster

  # SHARD 3 RS
  shard3svr1:
    image: mongo:7
    container_name: shard3svr1
    command: mongod --shardsvr --replSet shard3RS --port 27017 --bind_ip_all
    volumes:
      - shard3svr1_data:/data/db
    networks:
      - mongo-cluster

  shard3svr2:
    image: mongo:7
    container_name: shard3svr2
    command: mongod --shardsvr --replSet shard3RS --port 27017 --bind_ip_all
    volumes:
      - shard3svr2_data:/data/db
    networks:
      - mongo-cluster

  shard3svr3:
    image: mongo:7
    container_name: shard3svr3
    command: mongod --shardsvr --replSet shard3RS --port 27017 --bind_ip_all
    volumes:
      - shard3svr3_data:/data/db
    networks:
      - mongo-cluster

  # MONGOS (Router)
  mongos:
    image: mongo:7
    container_name: mongos
    command: mongos --configdb configRS/configsvr1:27017,configsvr2:27017,configsvr3:27017 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1svr1
      - shard2svr1
      - shard3svr1
    networks:
      - mongo-cluster

  # INIT SCRIPT (executed once to initialize the cluster)
  init-cluster:
    image: mongo:7
    container_name: init-cluster
    depends_on:
      - mongos
    volumes:
      - ./scripts:/scripts
    entrypoint: ["bash", "/scripts/init-cluster.sh"]
    networks:
      - mongo-cluster

networks:
  mongo-cluster:
    driver: bridge

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1svr1_data:
  shard1svr2_data:
  shard1svr3_data:
  shard2svr1_data:
  shard2svr2_data:
  shard2svr3_data:
  shard3svr1_data:
  shard3svr2_data:
  shard3svr3_data:
